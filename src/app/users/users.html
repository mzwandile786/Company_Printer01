<div class="page-title">
  <h1>Users Management</h1>
</div>

<div class="search-section">

  <mat-card class="filter-card">

    <!-- Filter Row -->
    <div class="filter-row">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Filter by Designation</mat-label>

        <mat-select
          [(ngModel)]="selectedDesignation"
          (selectionChange)="filterUsers()">

          <mat-option [value]="null">All</mat-option>

          <mat-option
            *ngFor="let d of designations"
            [value]="d.DesignationID">

            {{ d.DesignationName }}

          </mat-option>

        </mat-select>
      </mat-form-field>

    </div>

    <!-- Button Row -->
    <div class="button-row">
    <!--  <button mat-raised-button class="btn-green" (click)="openDialog()">
        Add New User
      </button>  -->

      <button mat-stroked-button class="btn-clear" (click)="clearFilter()">
        Clear
      </button>
    </div>

  </mat-card>
</div>

<div class="table-header">
  <button mat-raised-button class="btn-green" (click)="openDialog()">
    Add New User
  </button>

 <div class="search-wrapper">
  <mat-icon class="search-icon">search</mat-icon>
  <input type="text"
         placeholder="Search Users..."
         [(ngModel)]="globalFilter"
         (keyup)="applyGlobalFilter()"
         class="filter-input">
</div>
</div>


<app-loading-container [loading]="isLoading" [size]="60">
<div class="table-container mat-elevation-z8">
  <table mat-table [dataSource]="dataSource">

    <ng-container matColumnDef="FirstName">
      <th mat-header-cell *matHeaderCellDef>
        <div class="header-label">First Name</div>
      </th>
      <td mat-cell *matCellDef="let element"> {{element.FirstName}} </td>
    </ng-container>

    <ng-container matColumnDef="LastName">
      <th mat-header-cell *matHeaderCellDef>
        <div class="header-label">Last Name</div>
      </th>
      <td mat-cell *matCellDef="let element"> {{element.LastName}} </td>
    </ng-container>

    <ng-container matColumnDef="Email">
      <th mat-header-cell *matHeaderCellDef>
        <div class="header-label">Email</div>
      </th>
      <td mat-cell *matCellDef="let element"> {{element.Email}} </td>
    </ng-container>

    <ng-container matColumnDef="UserName">
      <th mat-header-cell *matHeaderCellDef>
        <div class="header-label">User Name</div>
      </th>
      <td mat-cell *matCellDef="let element"> {{element.UserName}} </td>
    </ng-container>

    <ng-container matColumnDef="DesignationName">
      <th mat-header-cell *matHeaderCellDef>
        <div class="header-label">Designation</div>
      </th>
      <td mat-cell *matCellDef="let element"> {{element.DesignationName}} </td>
    </ng-container>

     <ng-container matColumnDef="Password">
      <th mat-header-cell *matHeaderCellDef>
        <div class="header-label">Password</div>  
      </th>
      <td mat-cell *matCellDef="let element"> {{element.Password}} </td>
    </ng-container>

    <ng-container matColumnDef="Edit">
      <th mat-header-cell *matHeaderCellDef> Edit </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="openDialog(element)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="Delete">
      <th mat-header-cell *matHeaderCellDef> Delete </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="warn" (click)="deleteUser(element.UserID)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>

</div>
  </app-loading-container>
